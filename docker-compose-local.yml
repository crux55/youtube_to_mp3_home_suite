services:
  youtube-downloader:
    build: .
    container_name: youtube-to-mp3-suite
    user: "0:0"  # Run as root to avoid permission issues
    volumes:
      # Use local directories for testing
      - Y:\Music\:/mnt/UBERVAULT/Music
      - Y:\Video\:/mnt/UBERVAULT/Video
      - Y:\Torrents\Local\:/mnt/UBERVAULT/Torrents/Local

      # Mount config file
      - ./playlists.yaml:/app/playlists.yaml:ro
    environment:
      - TZ=UTC
    restart: unless-stopped
    # Uncomment if you want to run it periodically with cron
    # command: sh -c "while true; do python main.py; sleep 3600; done"
