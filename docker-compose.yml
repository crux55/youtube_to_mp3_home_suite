services:
  youtube-downloader:
    build: .
    container_name: youtube-to-mp3-suite
    user: "0:0"  # Run as root to avoid permission issues with mounted volumes
    volumes:
      # Option 5: Local testing folder (for troubleshooting)
      - ./downloads/Music:/mnt/UBERVAULT/Music
      - ./downloads/Video:/mnt/UBERVAULT/Video
      - ./downloads/Torrents:/mnt/UBERVAULT/Torrents/Local
      
      # Mount config file
      - ./playlists.yaml:/app/playlists.yaml:ro
    environment:
      - TZ=UTC
      # If network drive requires credentials, add them here
      # - NETWORK_USER=your_username
      # - NETWORK_PASS=your_password
    restart: unless-stopped
    # Default: Run playlist mode
    command: python main.py
    # Uncomment if you want to run it periodically with cron
    # command: sh -c "while true; do python main.py; sleep 3600; done"

  # Alternative service for Lidarr mode
  lidarr-downloader:
    build: .
    container_name: youtube-lidarr-suite
    user: "0:0"
    volumes:
      - ./downloads/Music:/mnt/UBERVAULT/Music
      - ./downloads/Video:/mnt/UBERVAULT/Video
      - ./downloads/Torrents:/mnt/UBERVAULT/Torrents/Local
      - ./playlists.yaml:/app/playlists.yaml:ro
    environment:
      - TZ=UTC
    # Run in Lidarr mode
    command: python main.py --lidarr
    # Don't auto-restart in Lidarr mode - run manually
    restart: "no"
    profiles: ["lidarr"]

  # Dry run service for testing
  lidarr-dry-run:
    build: .
    container_name: youtube-lidarr-dry-run
    user: "0:0"
    volumes:
      - ./downloads/Music:/mnt/UBERVAULT/Music
      - ./downloads/Video:/mnt/UBERVAULT/Video
      - ./downloads/Torrents:/mnt/UBERVAULT/Torrents/Local
      - ./playlists.yaml:/app/playlists.yaml:ro
    environment:
      - TZ=UTC
    # Run in Lidarr dry-run mode
    command: python main.py --lidarr --dry-run
    restart: "no"
    profiles: ["dry-run"]
