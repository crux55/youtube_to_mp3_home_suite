services:
  youtube-downloader:
    build: .
    container_name: youtube-to-mp3-suite
    user: "0:0"  # Run as root to avoid permission issues with mounted volumes
    volumes:
      # Option 1: Using mapped drive letter (map \\Uber-vault\ubervault to Z: first)
      - Y:/Music:/mnt/UBERVAULT/Music
      - Y:/Video:/mnt/UBERVAULT/Video
      - Y:/Torrents/Local:/mnt/UBERVAULT/Torrents/Local
      
      # Alternative: WSL2 path format (if using WSL2 backend)
      # - /mnt/UBERVAULT/Music:/mnt/UBERVAULT/Music
      # - /mnt/UBERVAULT/Video:/mnt/UBERVAULT/Video
      # - /mnt/UBERVAULT/Torrents/Local:/mnt/UBERVAULT/Torrents/Local
      
      # Mount config file
      - ./playlists.yaml:/app/playlists.yaml:ro
    environment:
      - TZ=UTC
      # If network drive requires credentials, add them here
      # - NETWORK_USER=your_username
      # - NETWORK_PASS=your_password
    restart: unless-stopped
    # Uncomment if you want to run it periodically with cron
    # command: sh -c "while true; do python main.py; sleep 3600; done"
